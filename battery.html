<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Parts | Mech Care</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app-shell">
        <header>
            <h2>Battery Parts</h2>
        </header>

        <div class="search">
            <input type="text" placeholder="Search Auto Parts...">
            <div class="search-suggestions">
                <button type="button" data-href="battery.html">Battery</button>
                <button type="button" data-href="tyre.html">Tyre</button>
                <button type="button" data-href="oil.html">Engine Oil</button>
                <button type="button" data-href="brake.html">Brake Disc</button>
                <button type="button" data-href="filter.html">Air Filter</button>
                <button type="button" data-href="spark.html">Spark Plugs</button>
            </div>
        </div>

        <section class="search-page">
            <p class="search-note">Browse the best battery products for your vehicle.</p>
            <div class="container">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600" alt="Car Battery">
                    <div class="content">
                        <h3>Car Battery</h3>
                        <p>Premium Long Life Battery</p>
                        <h2>$129.99</h2>
                        <button>Add To Cart</button>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1531379410505-28d5cecdb9d6?w=600" alt="Motorcycle Battery">
                    <div class="content">
                        <h3>Motorcycle Battery</h3>
                        <p>Compact Performance Battery</p>
                        <h2>$99.99</h2>
                        <button>Add To Cart</button>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1589911908574-84cb5ae1c50d?w=600" alt="Deep Cycle Battery">
                    <div class="content">
                        <h3>Deep Cycle Battery</h3>
                        <p>Reliable Power for Accessories</p>
                        <h2>$179.99</h2>
                        <button>Add To Cart</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 Home</a>
        <a href="search.html">🔍 Search</a>
        <a href="cart.html">🛒 Cart</a>
        <a href="#">👤 Profile</a>
    </nav>
    <script>
        const CART_KEY = 'mechcareCart';

        function getCart() {
            return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function addProductToCart(product) {
            const cart = getCart();
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({...product,
                    qty: 1
                });
            }
            saveCart(cart);
        }

        document.querySelectorAll('.card button').forEach(button => {
            button.addEventListener('click', () => {
                const card = button.closest('.card');
                const name = card.querySelector('h3').textContent.trim();
                const description = card.querySelector('p').textContent.trim();
                const price = parseFloat(card.querySelector('h2').textContent.replace('$', '').trim()) || 0;
                const image = card.querySelector('img').src;
                const id = name.toLowerCase().replace(/\s+/g, '-');
                addProductToCart({
                    id,
                    name,
                    description,
                    price,
                    image
                });
                button.textContent = 'Added';
                button.disabled = true;
                setTimeout(() => {
                    button.textContent = 'Add To Cart';
                    button.disabled = false;
                }, 1200);
            });
        });

        document.querySelectorAll('.search-suggestions button[data-href]').forEach(button => {
            button.addEventListener('click', () => {
                window.location.href = button.dataset.href;
            });
        });
    </script>
</body>

</html>
