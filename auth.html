<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Mech Care</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-header">
                <h2>Welcome to Mech Care</h2>
                <p>Sign in to continue shopping for auto parts.</p>
            </div>

            <div class="auth-tabs">
                <button id="loginTab" class="auth-tab active">Login</button>
                <button id="signupTab" class="auth-tab">Sign Up</button>
            </div>

            <form id="authForm" class="auth-form">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="name">Full Name</label>
                    <input id="name" type="text" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Password">
                </div>
                <button id="authSubmit" type="button" class="primary-btn">Login</button>
                <p class="auth-note">New here? Click sign up to create an account.</p>
                <p id="authError" class="auth-error"></p>
            </form>
        </section>
    </main>

    <script>
        const USERS_KEY = 'mechcareUsers';
        const CURRENT_USER_KEY = 'mechcareCurrentUser';

        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const nameGroup = document.getElementById('nameGroup');
        const authForm = document.getElementById('authForm');
        const authSubmit = document.getElementById('authSubmit');
        const authError = document.getElementById('authError');

        let mode = 'login';

        function getUsers() {
            return JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function setCurrentUser(user) {
            localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
        }

        function switchMode(selectedMode) {
            mode = selectedMode;
            authError.textContent = '';
            if (mode === 'signup') {
                nameGroup.style.display = 'block';
                authSubmit.textContent = 'Sign Up';
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                document.querySelector('.auth-note').textContent = 'Already have an account? Click login.';
            } else {
                nameGroup.style.display = 'none';
                authSubmit.textContent = 'Login';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                document.querySelector('.auth-note').textContent = 'New here? Click sign up to create an account.';
            }
        }

        function showError(message) {
            authError.textContent = message;
        }

        function handleAuth() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const users = getUsers();

            if (!email || !password || (mode === 'signup' && !name)) {
                showError('Please fill in all required fields.');
                return;
            }

            if (mode === 'signup') {
                const existing = users.find(user => user.email === email);
                if (existing) {
                    showError('An account with this email already exists.');
                    return;
                }
                const createdAt = new Date().toISOString();
                const newUser = {
                    name,
                    email,
                    password,
                    createdAt
                };
                users.push(newUser);
                saveUsers(users);
                setCurrentUser({
                    name,
                    email,
                    createdAt
                });
                window.location.href = 'index.html';
            } else {
                const user = users.find(user => user.email === email && user.password === password);
                if (!user) {
                    showError('Invalid email or password.');
                    return;
                }
                setCurrentUser({
                    name: user.name,
                    email: user.email,
                    createdAt: user.createdAt
                });
                window.location.href = 'index.html';
            }
        }

        loginTab.addEventListener('click', () => switchMode('login'));
        signupTab.addEventListener('click', () => switchMode('signup'));
        authSubmit.addEventListener('click', handleAuth);

        if (localStorage.getItem(CURRENT_USER_KEY)) {
            window.location.href = 'index.html';
        }

        switchMode('login');
    </script>
</body>

</html>
